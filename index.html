<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Session Chair Pre-Meeting Scheduler | 2026 KoNECT-MOHW-MFDS</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
  :root{
    --navy:#2E1C5F;
    --navy-soft:#4B3B82;
    --blue:#4361AC;
    --coral:#EB6974;
    --lightblue:#9BABD7;
    --bg:#F6F6FB;
    --card:#FFFFFF;
    --line:#E4E3F1;
    --ink:#2A2740;
    --muted:#7A7793;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Pretendard',-apple-system,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1080px;margin:0 auto;padding:0 20px 64px;}

  /* Header */
  .hero{
    background:linear-gradient(155deg,var(--navy) 0%,#3a2a72 60%,var(--navy-soft) 100%);
    padding:36px 20px 46px;
    position:relative;
    overflow:hidden;
  }
  .hero::after{
    content:"";
    position:absolute;
    right:-60px;top:-60px;
    width:260px;height:260px;
    border-radius:50%;
    background:radial-gradient(circle,rgba(235,105,116,0.28),transparent 70%);
  }
  .hero-inner{max-width:1080px;margin:0 auto;position:relative;z-index:1;}
  .hero-logo{max-width:420px;width:100%;height:auto;}
  .hero-sub{
    margin-top:18px;
    color:#EFEEFA;
    font-size:15px;
    letter-spacing:0.02em;
  }
  .hero-title{
    margin:6px 0 0;
    font-size:26px;
    font-weight:800;
    color:#fff;
    letter-spacing:-0.01em;
  }
  .hero-title-sub{
    margin:2px 0 0;
    font-size:14px;
    font-weight:600;
    color:#C9C4E8;
  }

  /* Lang switch */
  .lang-switch{
    display:flex;justify-content:flex-end;gap:2px;margin-top:18px;
  }
  .lang-switch a{
    text-decoration:none;font-size:12.5px;font-weight:700;color:var(--muted);
    padding:6px 12px;border-radius:999px;border:1px solid transparent;
  }
  .lang-switch a.active{color:var(--navy);background:#fff;border-color:var(--line);}

  /* Info strip */
  .info-strip{
    margin-top:14px;
    position:relative;
    z-index:2;
    display:flex;
    gap:12px;
    flex-wrap:wrap;
  }
  .info-pill{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:12px;
    padding:14px 18px;
    box-shadow:0 8px 24px -14px rgba(46,28,95,0.35);
    display:flex;
    align-items:center;
    gap:10px;
    font-size:13.5px;
    color:var(--ink);
    flex:1;
    min-width:230px;
  }
  .info-pill b{color:var(--navy);font-weight:700;}
  .info-pill .dot{
    width:8px;height:8px;border-radius:50%;
    background:var(--coral);flex:none;
  }

  .back-link{display:inline-block;margin-top:18px;color:var(--blue);font-size:13px;font-weight:700;text-decoration:none;}
  .back-link:hover{text-decoration:underline;}

  /* Tabs */
  .tabs{
    display:flex;
    gap:6px;
    margin-top:20px;
    border-bottom:1px solid var(--line);
  }
  .tab-btn{
    appearance:none;
    border:none;
    background:none;
    padding:12px 18px;
    font-family:inherit;
    font-size:14.5px;
    font-weight:600;
    color:var(--muted);
    cursor:pointer;
    border-bottom:2.5px solid transparent;
    transition:color .15s ease, border-color .15s ease;
  }
  .tab-btn:hover{color:var(--navy-soft);}
  .tab-btn.active{color:var(--navy);border-color:var(--coral);}

  .panel{display:none;padding-top:22px;}
  .panel.active{display:block;}

  .card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:20px;
    margin-bottom:16px;
  }
  .card h3{margin:0 0 4px;font-size:16px;color:var(--navy);font-weight:800;}
  .card p.desc{margin:0 0 14px;color:var(--muted);font-size:13.5px;line-height:1.6;}

  .btn{
    appearance:none;border:none;border-radius:10px;
    padding:11px 20px;font-family:inherit;font-weight:700;font-size:14px;
    cursor:pointer;transition:transform .1s ease, box-shadow .15s ease, opacity .15s ease;
    text-decoration:none;display:inline-flex;align-items:center;justify-content:center;
  }
  .btn-primary{background:var(--navy);color:#fff;}
  .btn-primary:hover{background:var(--navy-soft);}
  .btn-primary:active{transform:scale(0.98);}
  .btn-secondary{background:#fff;color:var(--navy);border:1.5px solid var(--line);}
  .btn-secondary:hover{border-color:var(--lightblue);}
  .btn-coral{background:var(--coral);color:#fff;}
  .btn-coral:hover{opacity:0.9;}
  .btn-ghost{background:transparent;color:var(--muted);}
  .btn-ghost:hover{color:var(--navy);}
  .btn:disabled{opacity:0.45;cursor:not-allowed;}
  .btn-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  .btn-sm{padding:8px 14px;font-size:12.5px;}

  .empty-state{
    text-align:center;padding:48px 20px;color:var(--muted);font-size:14px;line-height:1.8;
  }
  .empty-state .big{font-size:34px;margin-bottom:6px;}

  /* Timezone banner */
  .tz-banner{
    background:#FFF6E9;border:1px solid #F4DFB8;color:#8A5A00;
    border-radius:10px;padding:10px 14px;font-size:12.5px;margin-bottom:14px;
    display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;
  }
  .tz-banner label{display:flex;align-items:center;gap:6px;font-weight:700;cursor:pointer;white-space:nowrap;}
  .tz-banner input[type=checkbox]{width:15px;height:15px;cursor:pointer;accent-color:#8A5A00;}

  /* Grid */
  .grid-scroll{overflow:auto;border:1px solid var(--line);border-radius:12px;max-height:560px;}
  .grid{display:grid;user-select:none;}
  .g-corner, .g-datehead, .g-hour, .g-cell{
    border-right:1px solid var(--line);
    border-bottom:1px solid var(--line);
    font-size:12px;
  }
  .g-corner{
    position:sticky;top:0;left:0;z-index:3;
    background:var(--card);
    min-height:52px;
  }
  .g-datehead{
    position:sticky;top:0;z-index:2;
    background:var(--card);
    text-align:center;
    padding:8px 4px;
    font-weight:700;
    color:var(--navy);
    line-height:1.35;
  }
  .g-datehead .wd{font-size:10.5px;color:var(--muted);font-weight:600;}
  .g-hour{
    position:sticky;left:0;z-index:1;
    background:var(--card);
    padding:6px 10px;
    color:var(--ink);
    font-weight:700;
    white-space:nowrap;
    display:flex;flex-direction:column;justify-content:center;
  }
  .g-hour .local{font-size:10px;color:var(--coral);font-weight:600;margin-top:1px;}
  .g-cell{
    min-height:26px;
    background:#fff;
    cursor:pointer;
    transition:background .05s ease;
  }
  .g-cell:hover{background:#EFEFFA;}
  .g-cell.selected{background:var(--navy);}
  .g-cell.heat{cursor:default;}

  /* Modal */
  .modal-overlay{
    position:fixed;inset:0;background:rgba(30,20,60,0.45);
    display:none;align-items:center;justify-content:center;z-index:50;padding:20px;
  }
  .modal-overlay.show{display:flex;}
  .modal-box{
    background:#fff;border-radius:16px;padding:26px;width:100%;max-width:380px;
    box-shadow:0 24px 60px -20px rgba(0,0,0,0.4);
  }
  .modal-box h4{margin:0 0 6px;color:var(--navy);font-size:17px;}
  .modal-box p{margin:0 0 16px;color:var(--muted);font-size:13px;line-height:1.6;}
  .modal-box input[type=text]{
    width:100%;padding:11px 13px;border-radius:9px;border:1.5px solid var(--line);
    font-family:inherit;font-size:14px;margin-bottom:14px;
  }
  .modal-box input[type=text]:focus{outline:none;border-color:var(--lightblue);}

  /* Legend */
  .legend{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);margin-top:10px;flex-wrap:wrap;}
  .legend .sq{width:14px;height:14px;border-radius:3px;display:inline-block;border:1px solid var(--line);}

  /* Calendar (admin) */
  .cal-group{margin-bottom:18px;}
  .cal-group h4{margin:0 0 8px;font-size:13.5px;color:var(--navy-soft);font-weight:700;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
  .cal-wd{text-align:center;font-size:11px;color:var(--muted);font-weight:700;padding-bottom:2px;}
  .cal-day{
    aspect-ratio:1;display:flex;align-items:center;justify-content:center;
    border-radius:8px;border:1.5px solid var(--line);font-size:12.5px;font-weight:600;
    cursor:pointer;color:var(--ink);background:#fff;
  }
  .cal-day.empty{visibility:hidden;cursor:default;}
  .cal-day.active{background:var(--navy);border-color:var(--navy);color:#fff;}
  .cal-day:hover:not(.empty):not(.active){border-color:var(--lightblue);}

  .name-chip{
    display:inline-flex;align-items:center;gap:6px;background:#F0EFFB;color:var(--navy-soft);
    padding:5px 11px;border-radius:999px;font-size:12.5px;font-weight:600;margin:3px 4px 0 0;
  }

  .toast{
    position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(12px);
    background:var(--navy);color:#fff;padding:12px 20px;border-radius:10px;font-size:13.5px;
    box-shadow:0 12px 30px -10px rgba(0,0,0,0.4);opacity:0;pointer-events:none;
    transition:opacity .2s ease, transform .2s ease;z-index:80;max-width:88vw;text-align:center;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  .top-slots{display:flex;flex-direction:column;gap:8px;}
  .top-slot-row{
    display:flex;align-items:center;gap:12px;background:#F8F8FD;border:1px solid var(--line);
    border-radius:10px;padding:10px 14px;font-size:13px;
  }
  .top-slot-row .rank{
    width:24px;height:24px;border-radius:50%;background:var(--coral);color:#fff;
    display:flex;align-items:center;justify-content:center;font-size:11.5px;font-weight:800;flex:none;
  }
  .top-slot-row .count{margin-left:auto;color:var(--navy);font-weight:800;white-space:nowrap;}

  .foot{
    text-align:center;color:var(--muted);font-size:12px;margin-top:36px;line-height:1.9;
  }
  .foot a{color:var(--blue);text-decoration:none;font-weight:600;}

  .danger-zone{border:1.5px dashed #EBBFC1;background:#FFF7F7;}
  .danger-zone h3{color:#C23B4A;}

  /* Hub / session list */
  .form-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px;}
  .form-row input[type=text]{
    flex:1;min-width:200px;padding:11px 13px;border-radius:9px;border:1.5px solid var(--line);
    font-family:inherit;font-size:14px;
  }
  .form-row input[type=text]:focus{outline:none;border-color:var(--lightblue);}

  .link-box{
    display:flex;gap:8px;flex-wrap:wrap;align-items:center;background:#F8F8FD;border:1px solid var(--line);
    border-radius:10px;padding:10px;margin-top:10px;
  }
  .link-box input.link-input{
    flex:1;min-width:180px;border:none;background:transparent;font-family:monospace;font-size:12.5px;
    color:var(--navy-soft);padding:6px 8px;
  }
  .link-box input.link-input:focus{outline:none;}

  .session-row{
    border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:10px;background:#fff;
  }
  .session-title{font-weight:800;color:var(--navy);font-size:15px;}
  .session-sub{font-size:11.5px;color:var(--muted);margin-top:2px;}
  .session-actions{margin-top:10px;}

  @media (max-width:640px){
    .hero-title{font-size:20px;}
    .hero-logo{max-width:280px;}
    .tab-btn{padding:10px 12px;font-size:13px;}
  }
</style>
</head>

<div class="wrap">
  <div class="lang-switch" id="langSwitch"></div>

  <!-- HUB VIEW -->
  <div id="hubView">
    <div id="hubLocked" class="empty-state" style="display:none;"></div>
    <div id="hubAdminContent">
      <div class="card">
        <h3 id="hubHeading"></h3>
        <p class="desc" id="hubDesc"></p>
        <div id="createForm">
          <div class="form-row">
            <input type="text" id="titleKoInput" placeholder="세션 이름 (한국어)">
            <input type="text" id="titleEnInput" placeholder="Session name (English)">
          </div>
          <button class="btn btn-primary" id="createSessionBtn"></button>
        </div>
        <div id="createResult"></div>
      </div>
      <div class="card">
        <h3 id="hubListHeading"></h3>
        <div id="sessionList"></div>
      </div>
    </div>
  </div>

  <!-- SESSION VIEW -->
  <div id="sessionView" style="display:none;">
    <a class="back-link" id="backLink" href="#"></a>

    <div class="info-strip">
      <div class="info-pill"><span class="dot"></span><span id="infoOnline"></span></div>
      <div class="info-pill"><span class="dot"></span><span id="infoDrag"></span></div>
      <div class="info-pill"><span class="dot"></span><span id="infoContactLabel"></span>&nbsp;<b><a href="mailto:kic@konect.or.kr" style="color:var(--navy-soft);text-decoration:none;">kic@konect.or.kr</a></b></div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="schedule" id="tabScheduleBtn"></button>
      <button class="tab-btn" data-tab="heatmap" id="tabHeatmapBtn"></button>
      <button class="tab-btn" data-tab="admin" id="tabAdminBtn"></button>
    </div>

    <div id="sessionNotFound" class="empty-state" style="display:none;"></div>

    <div id="sessionTabs">
      <!-- SCHEDULE TAB -->
      <div class="panel active" id="panel-schedule">
        <div class="card">
          <h3 id="schedHeading"></h3>
          <p class="desc" id="schedDesc"></p>
          <div id="tzBannerSchedule"></div>
          <div id="scheduleGridHolder"></div>
          <div class="legend">
            <span class="sq" style="background:#fff;"></span> <span id="legendUnselected"></span>
            <span class="sq" style="background:var(--navy);"></span> <span id="legendSelected"></span>
            <span style="margin-left:auto;color:var(--ink);font-weight:600;" id="selCount"></span>
          </div>
          <div class="btn-row" style="margin-top:16px;">
            <button class="btn btn-primary" id="submitBtn"></button>
            <button class="btn btn-ghost" id="clearSelBtn"></button>
          </div>
        </div>
      </div>

      <!-- HEATMAP TAB -->
      <div class="panel" id="panel-heatmap">
        <div class="card">
          <h3 id="heatHeading"></h3>
          <p class="desc" id="heatDesc"></p>
          <div id="tzBannerHeatmap"></div>
          <div id="heatmapSummary" style="margin-bottom:12px;font-size:13px;color:var(--muted);"></div>
          <div id="heatmapGridHolder"></div>
          <div class="legend">
            <span class="sq" style="background:#fff;"></span> <span id="legend0"></span>
            <span class="sq" style="background:#C7CFEA;"></span> <span id="legendLow"></span>
            <span class="sq" style="background:#5A6FB0;"></span> <span id="legendMed"></span>
            <span class="sq" style="background:var(--navy);"></span> <span id="legendHigh"></span>
          </div>
        </div>
        <div class="card">
          <h3 id="topHeading"></h3>
          <div class="top-slots" id="topSlots"></div>
        </div>
        <div class="card">
          <h3 id="listHeading"></h3>
          <div id="respondentList"></div>
        </div>
      </div>

      <!-- ADMIN TAB -->
      <div class="panel" id="panel-admin">
        <div class="card">
          <h3 id="shareLinkHeading"></h3>
          <p class="desc" id="shareLinkDesc"></p>
          <div style="font-size:12.5px;font-weight:700;color:var(--navy-soft);" id="participantLinkLabel"></div>
          <div class="link-box">
            <input type="text" class="link-input" id="sessionLinkInput" readonly>
            <button class="btn btn-secondary btn-sm" id="copySessionLinkBtn"></button>
          </div>
          <div style="font-size:12.5px;font-weight:700;color:var(--navy-soft);margin-top:14px;" id="adminLinkLabel"></div>
          <div class="link-box">
            <input type="text" class="link-input" id="adminLinkInput" readonly>
            <button class="btn btn-secondary btn-sm" id="copyAdminLinkBtn"></button>
          </div>
        </div>
        <div class="card">
          <h3 id="renameHeading"></h3>
          <div class="form-row">
            <input type="text" id="renameKoInput" placeholder="세션 이름 (한국어)">
            <input type="text" id="renameEnInput" placeholder="Session name (English)">
          </div>
          <button class="btn btn-secondary btn-sm" id="renameSaveBtn"></button>
        </div>
        <div class="card">
          <h3 id="adminDateHeading"></h3>
          <p class="desc" id="adminDateDesc"></p>
          <div id="calHolder"></div>
          <div class="btn-row" style="margin-top:16px;">
            <button class="btn btn-primary" id="saveDatesBtn"></button>
            <span id="activeDateCount" style="font-size:13px;color:var(--muted);align-self:center;"></span>
          </div>
        </div>
        <div class="card danger-zone">
          <h3 id="dangerHeading"></h3>
          <p class="desc" id="dangerDesc"></p>
          <button class="btn" style="background:#C23B4A;color:#fff;" id="resetAllBtn"></button>
        </div>
      </div>
    </div>
  </div>

  <div class="foot" id="footNote"></div>
</div>

  function fallbackCopy(str){
    var ta=document.createElement('textarea'); ta.value=str; ta.style.position='fixed'; ta.style.opacity='0';

  // ---------------- Timezone helpers ----------------
  var userTz = Intl.DateTimeFormat().resolvedOptions().timeZone || 'Asia/Seoul';
  var showLocal = (userTz !== 'Asia/Seoul');
  var localViewOn = false;
  function localLabelForHour(hour, refDateISO){
    try{
      var ref = refDateISO || toISO(new Date());
      var kstDate = new Date(ref+'T'+pad(hour)+':00:00+09:00');
      var timeStr = kstDate.toLocaleTimeString(lang==='ko'?'ko-KR':'en-US',{timeZone:userTz,hour:'2-digit',minute:'2-digit',hour12:false});
      var localDay = kstDate.toLocaleDateString('en-CA',{timeZone:userTz});
      var diffLabel = '';
      if(localDay !== ref){
        diffLabel = (new Date(localDay) < new Date(ref)) ? (lang==='ko'?' (전날)':' (prev day)') : (lang==='ko'?' (다음날)':' (next day)');
      }
      return timeStr+diffLabel;
    }catch(e){ return ''; }
  }
  function hourLabels(hour, refDateISO){
    var kst = pad(hour)+':00';
    if(!showLocal){ return {primary:kst, secondary:''}; }
    var loc = localLabelForHour(hour, refDateISO);
    if(localViewOn){ return {primary:loc, secondary:'KST '+kst}; }
    return {primary:kst, secondary:loc};
  }

    });

  // ================= Firestore data layer =================
  function sessionsCol(){ return db.collection('sessions'); }
  function sessionDoc(id){ return db.collection('sessions').doc(id); }
  function responsesCol(id){ return sessionDoc(id).collection('responses'); }
  function datesDoc(id){ return sessionDoc(id).collection('meta').doc('dates'); }

  async function fetchSessionsIndex(){
    var snap = await sessionsCol().get();
    return snap.docs.map(function(d){ return Object.assign({id:d.id}, d.data()); });
  }
  async function createSessionDoc(titleKo, titleEn){
    var ref = await sessionsCol().add({titleKo:titleKo, titleEn:titleEn, createdAt:new Date().toISOString()});
    return ref.id;
  }
  async function renameSessionDoc(id, titleKo, titleEn){
    await sessionDoc(id).update({titleKo:titleKo, titleEn:titleEn});
  }
  async function deleteSessionDoc(id){
    var respSnap = await responsesCol(id).get();
    var batch = db.batch();
    respSnap.docs.forEach(function(d){ batch.delete(d.ref); });
    batch.delete(datesDoc(id));
    batch.delete(sessionDoc(id));
    await batch.commit();
  }
  async function fetchActiveDates(id){
    var doc = await datesDoc(id).get();
    return doc.exists ? (doc.data().activeDates || []) : [];
  }
  async function saveActiveDatesDoc(id, dates){
    await datesDoc(id).set({activeDates:dates});
  }
  async function fetchResponses(id){
    var snap = await responsesCol(id).get();
    return snap.docs.map(function(d){ return d.data(); });
  }
  async function submitResponseDoc(id, name, slots){
    var docId = encodeURIComponent(name);
    var ref = responsesCol(id).doc(docId);
    var existing = await ref.get();
    return {ref:ref, exists:existing.exists};
  }
  async function deleteAllResponsesDocs(id){
    var snap = await responsesCol(id).get();
    var batch = db.batch();
    snap.docs.forEach(function(d){ batch.delete(d.ref); });
    await batch.commit();
  }

      });
    });
    holder.querySelectorAll('.del-session').forEach(function(btn){
      btn.addEventListener('click', async function(){
        if(!confirm(t('deleteSessionConfirm'))) return;
        var id = btn.dataset.id;
        btn.disabled = true;
        try{
          await deleteSessionDoc(id);
          sessionsIndex = sessionsIndex.filter(function(s){ return s.id!==id; });
          showToast(t('toastSessionDeleted'));
          renderSessionList();
        }catch(e){ showToast(t('toastSaveFail')); btn.disabled=false; }
      });
    });
  }

  document.getElementById('createSessionBtn').addEventListener('click', async function(){
    var ko = document.getElementById('titleKoInput').value.trim();
    var en = document.getElementById('titleEnInput').value.trim();
    if(!ko && !en){ showToast(t('toastNeedTitle')); return; }
    var btn = this; btn.disabled = true;
    try{
      var id = await createSessionDoc(ko, en);
      sessionsIndex.push({id:id, titleKo:ko, titleEn:en, createdAt:new Date().toISOString()});
      document.getElementById('titleKoInput').value='';
      document.getElementById('titleEnInput').value='';
      showToast(t('toastSessionCreated'));
      document.getElementById('createResult').innerHTML =
        '<div style="font-size:11.5px;font-weight:700;color:var(--navy-soft);margin-top:10px;">'+t('participantLinkLabel')+'</div>'+
        '<div class="link-box">'+
          '<input type="text" class="link-input" readonly value="'+fullLink(id)+'">'+
          '<button class="btn btn-secondary btn-sm" id="copyNewLinkBtn">'+t('copyBtn')+'</button>'+
        '</div>'+
        '<div style="font-size:11.5px;font-weight:700;color:var(--navy-soft);margin-top:8px;">'+t('adminLinkLabel')+'</div>'+
        '<div class="link-box">'+
          '<input type="text" class="link-input" readonly value="'+fullLinkAdmin(id)+'">'+
          '<button class="btn btn-secondary btn-sm" id="copyNewAdminLinkBtn">'+t('copyBtn')+'</button>'+
          '<a class="btn btn-primary btn-sm" href="'+buildUrl({session:id,admin:'1'})+'">'+t('openBtn')+'</a>'+
        '</div>';
      document.getElementById('copyNewLinkBtn').addEventListener('click', function(){ copyText(fullLink(id)); });
      document.getElementById('copyNewAdminLinkBtn').addEventListener('click', function(){ copyText(fullLinkAdmin(id)); });
      renderSessionList();
    }catch(e){
      showToast(t('toastSaveFail'));
    }
    btn.disabled = false;
  });

  // ================= SESSION =================
  var activeDates = [];
  var adminSelection = new Set();
  var selection = new Set();
  var isSelecting = false;
  var selectMode = true;
  var currentSessionMeta = null;

  function keyOf(dateISO, hour){ return dateISO+'_'+pad(hour); }

  function groupByMonth(dates){
    var groups = {};
    dates.forEach(function(iso){
      var key = iso.slice(0,7);
      if(!groups[key]) groups[key]=[];
      groups[key].push(iso);
    });
    return groups;
  }
  var MONTH_NAMES_KO = {'2026-07':'2026년 7월','2026-08':'2026년 8월','2026-09':'2026년 9월'};
  var MONTH_NAMES_EN = {'2026-07':'July 2026','2026-08':'August 2026','2026-09':'September 2026'};

  function renderAdminCalendar(){
    var holder = document.getElementById('calHolder');
    var groups = groupByMonth(allRangeDates());
    var monthNames = lang==='ko' ? MONTH_NAMES_KO : MONTH_NAMES_EN;
    var html = '';
    Object.keys(groups).sort().forEach(function(mk){
      var dates = groups[mk];
      var first = parseISO(dates[0]);
      var leadEmpty = first.getDay();
      html += '<div class="cal-group"><h4>'+(monthNames[mk]||mk)+'</h4><div class="cal-grid">';
      WD.forEach(function(w){ html += '<div class="cal-wd">'+w+'</div>'; });
      for(var i=0;i<leadEmpty;i++){ html += '<div class="cal-day empty"></div>'; }
      dates.forEach(function(iso){
        var day = parseISO(iso).getDate();
        var active = adminSelection.has(iso) ? ' active' : '';
        html += '<div class="cal-day'+active+'" data-date="'+iso+'">'+day+'</div>';
      });
      html += '</div></div>';
    });
    holder.innerHTML = html;
    holder.querySelectorAll('.cal-day:not(.empty)').forEach(function(el){
      el.addEventListener('click', function(){
        var d = el.dataset.date;
        if(adminSelection.has(d)){ adminSelection.delete(d); el.classList.remove('active'); }
        else { adminSelection.add(d); el.classList.add('active'); }
        updateActiveDateCount();
      });
    });
    updateActiveDateCount();
  }
  function updateActiveDateCount(){
    document.getElementById('activeDateCount').textContent = t('activeDateCountLabel')+': '+adminSelection.size;
  }

  document.getElementById('saveDatesBtn').addEventListener('click', async function(){
    var btn = this; btn.disabled = true;
    var arr = Array.from(adminSelection).sort();
    try{
      await saveActiveDatesDoc(sessionId, arr);
      activeDates = arr;
      showToast(t('toastDatesSaved',{n:arr.length}));
      renderScheduleGrid();
    }catch(e){ showToast(t('toastSaveFail')); }
    btn.disabled = false;
  });

  document.getElementById('resetAllBtn').addEventListener('click', async function(){
    if(!confirm(t('confirmReset1'))) return;
    if(!confirm(t('confirmReset2'))) return;
    try{
      await deleteAllResponsesDocs(sessionId);
      showToast(t('toastAllDeleted'));
      refreshHeatmap();
    }catch(e){ showToast(t('toastSaveFail')); }
  });

  document.getElementById('copySessionLinkBtn').addEventListener('click', function(){
    copyText(fullLink(sessionId));
  });
  document.getElementById('copyAdminLinkBtn').addEventListener('click', function(){
    copyText(fullLinkAdmin(sessionId));
  });

  document.getElementById('renameSaveBtn').addEventListener('click', async function(){
    var ko = document.getElementById('renameKoInput').value.trim();
    var en = document.getElementById('renameEnInput').value.trim();
    if(!ko && !en){ showToast(t('toastNeedTitle')); return; }
    var btn = this; btn.disabled = true;
    try{
      await renameSessionDoc(sessionId, ko, en);
      currentSessionMeta = Object.assign({}, currentSessionMeta, {titleKo:ko, titleEn:en});
      var idx = sessionsIndex.findIndex(function(s){ return s.id===sessionId; });
      if(idx>=0){ sessionsIndex[idx] = Object.assign({}, sessionsIndex[idx], {titleKo:ko, titleEn:en}); }
      showToast(t('toastRenamed'));
      renderHeroForSession();
    }catch(e){ showToast(t('toastSaveFail')); }
    btn.disabled = false;
  });

  function renderScheduleGrid(){
    renderTzBanner(document.getElementById('tzBannerSchedule'));
    var holder = document.getElementById('scheduleGridHolder');
    if(activeDates.length===0){
      holder.innerHTML = '<div class="empty-state"><div class="big">🗓️</div>'+t('emptyNoDates')+'</div>';
      updateSelCount();
      return;
    }
    var cols = 'minmax(64px,86px) ' + activeDates.map(function(){return 'minmax(56px,1fr)';}).join(' ');
    var html = '<div class="grid-scroll"><div class="grid" style="grid-template-columns:'+cols+';">';
    html += '<div class="g-corner"></div>';
    activeDates.forEach(function(iso){
      var d = parseISO(iso);
      html += '<div class="g-datehead">'+(d.getMonth()+1)+'/'+d.getDate()+'<div class="wd">'+WD[d.getDay()]+'</div></div>';
    });
    HOURS.forEach(function(hh){
      var hl = hourLabels(hh, activeDates[0]);
      html += '<div class="g-hour">'+hl.primary+(hl.secondary?'<div class="local">'+hl.secondary+'</div>':'')+'</div>';
      activeDates.forEach(function(iso){
        var k = keyOf(iso,hh);
        var sel = selection.has(k) ? ' selected' : '';
        html += '<div class="g-cell'+sel+'" data-key="'+k+'"></div>';
      });
    });
    html += '</div></div>';
    holder.innerHTML = html;
    attachDragHandlers(holder);
    updateSelCount();
  }
  function setCell(el, on){
    var k = el.dataset.key;
    if(on){ selection.add(k); el.classList.add('selected'); }
    else { selection.delete(k); el.classList.remove('selected'); }
  }
  function attachDragHandlers(holder){
    var cells = holder.querySelectorAll('.g-cell');
    cells.forEach(function(cell){
      cell.addEventListener('mousedown', function(e){
        e.preventDefault();
        isSelecting = true;
        selectMode = !selection.has(cell.dataset.key);
        setCell(cell, selectMode);
        updateSelCount();
      });
      cell.addEventListener('mouseenter', function(){
        if(isSelecting){ setCell(cell, selectMode); updateSelCount(); }
      });
      cell.addEventListener('touchstart', function(){
        isSelecting = true;
        selectMode = !selection.has(cell.dataset.key);
        setCell(cell, selectMode);
        updateSelCount();
      }, {passive:true});
    });
    holder.addEventListener('touchmove', function(e){
      if(!isSelecting) return;
      var tp = e.touches[0];
      var el = document.elementFromPoint(tp.clientX, tp.clientY);
      if(el && el.classList.contains('g-cell')){ setCell(el, selectMode); updateSelCount(); }
    }, {passive:true});
  }
  document.addEventListener('mouseup', function(){ isSelecting = false; });
  document.addEventListener('touchend', function(){ isSelecting = false; });
  function updateSelCount(){
    document.getElementById('selCount').textContent = selection.size + t('selCountSuffix');
  }
  document.getElementById('clearSelBtn').addEventListener('click', function(){
    selection.clear();
    renderScheduleGrid();
  });

  var nameModal = document.getElementById('nameModal');
  document.getElementById('submitBtn').addEventListener('click', function(){
    if(selection.size===0){ showToast(t('toastSelectFirst')); return; }
    document.getElementById('modalDesc').textContent = t('modalDesc',{n:selection.size});
    document.getElementById('nameInput').value = '';
    nameModal.classList.add('show');
    setTimeout(function(){ document.getElementById('nameInput').focus(); }, 50);
  });
  document.getElementById('modalCancelBtn').addEventListener('click', function(){ nameModal.classList.remove('show'); });
  document.getElementById('nameInput').addEventListener('keydown', function(e){
    if(e.key==='Enter'){ document.getElementById('modalConfirmBtn').click(); }
  });
  document.getElementById('modalConfirmBtn').addEventListener('click', async function(){
    var name = document.getElementById('nameInput').value.trim();
    if(!name){ showToast(t('toastNeedName')); return; }
    var btn = this;
    btn.disabled = true;
    try{
      var res = await submitResponseDoc(sessionId, name, Array.from(selection));
      if(res.exists){
        var proceed = confirm(t('toastOverwriteConfirm',{name:name}));
        if(!proceed){ btn.disabled=false; return; }
      }
      await res.ref.set({name:name, slots:Array.from(selection), submittedAt:new Date().toISOString()});
      nameModal.classList.remove('show');
      showToast(t('toastSubmitSuccess',{name:name}));
      selection.clear();
      renderScheduleGrid();
    }catch(e){
      showToast(t('toastSubmitFail'));
    }
    btn.disabled = false;
  });

  async function refreshHeatmap(){
    renderTzBanner(document.getElementById('tzBannerHeatmap'));
    var holder = document.getElementById('heatmapGridHolder');
    holder.innerHTML = '';
    document.getElementById('heatmapSummary').textContent = '';
    document.getElementById('topSlots').innerHTML = '';
    document.getElementById('respondentList').innerHTML = '';

    if(activeDates.length===0){
      holder.innerHTML = '<div class="empty-state"><div class="big">🗓️</div>'+t('emptyNoDates')+'</div>';
      return;
    }

    var responses;
    try{ responses = await fetchResponses(sessionId); }
    catch(e){ holder.innerHTML = '<div class="empty-state">'+t('toastLoadFail')+'</div>'; return; }

    if(responses.length===0){
      holder.innerHTML = '<div class="empty-state"><div class="big">🌱</div>'+t('emptyNoResponses')+'</div>';
      document.getElementById('heatmapSummary').textContent = t('respondentsPrefix')+': 0';
      return;
    }

    var counts = {}; var namesBySlot = {};
    responses.forEach(function(r){
      (r.slots||[]).forEach(function(k){
        counts[k] = (counts[k]||0)+1;
        if(!namesBySlot[k]) namesBySlot[k]=[];
        namesBySlot[k].push(r.name);
      });
    });
    var maxCount = 0;
    Object.keys(counts).forEach(function(k){ if(counts[k]>maxCount) maxCount=counts[k]; });
    document.getElementById('heatmapSummary').textContent = t('respondentsPrefix')+': '+responses.length;

    var cols = 'minmax(64px,86px) ' + activeDates.map(function(){return 'minmax(56px,1fr)';}).join(' ');
    var html = '<div class="grid-scroll"><div class="grid" style="grid-template-columns:'+cols+';">';
    html += '<div class="g-corner"></div>';
    activeDates.forEach(function(iso){
      var d = parseISO(iso);
      html += '<div class="g-datehead">'+(d.getMonth()+1)+'/'+d.getDate()+'<div class="wd">'+WD[d.getDay()]+'</div></div>';
    });
    HOURS.forEach(function(hh){
      var hl = hourLabels(hh, activeDates[0]);
      html += '<div class="g-hour">'+hl.primary+(hl.secondary?'<div class="local">'+hl.secondary+'</div>':'')+'</div>';
      activeDates.forEach(function(iso){
        var k = keyOf(iso,hh);
        var c = counts[k]||0;
        var bg = heatColor(c, maxCount);
        var names = (namesBySlot[k]||[]).join(', ');
        var title = c>0 ? t('peopleAvailable',{n:c})+': '+names : t('noAvailable');
        html += '<div class="g-cell heat" style="background:'+bg+';" title="'+escapeHtml(title)+'"></div>';
      });
    });
    html += '</div></div>';
    holder.innerHTML = html;

    var sorted = Object.keys(counts).sort(function(a,b){ return counts[b]-counts[a]; }).slice(0,3);
    var topHtml = '';
    if(sorted.length===0 || counts[sorted[0]]===0){
      topHtml = '<p style="color:var(--muted);font-size:13px;">'+t('notEnoughData')+'</p>';
    } else {
      sorted.forEach(function(k, idx){
        var parts = k.split('_');
        var d = parseISO(parts[0]);
        var label = (d.getMonth()+1)+'/'+d.getDate()+' ('+WD[d.getDay()]+') '+parts[1]+':00-'+pad((+parts[1])+1)+':00';
        topHtml += '<div class="top-slot-row"><span class="rank">'+(idx+1)+'</span>'+label+'<span class="count">'+t('peopleAvailable',{n:counts[k]})+'</span></div>';
      });
    }
    document.getElementById('topSlots').innerHTML = topHtml;
    document.getElementById('respondentList').innerHTML = responses.map(function(r){
      return '<span class="name-chip">'+escapeHtml(r.name)+' &middot; '+(r.slots?r.slots.length:0)+'</span>';
    }).join('');
  }

  function heatColor(count, max){
    if(count===0 || max===0) return '#ffffff';
    var t2 = count/max;
    var c1=[255,255,255], c2=[155,171,215], c3=[46,28,95], r,g,b;
    if(t2<0.5){ var tt=t2/0.5; r=c1[0]+(c2[0]-c1[0])*tt; g=c1[1]+(c2[1]-c1[1])*tt; b=c1[2]+(c2[2]-c1[2])*tt; }
    else{ var tt2=(t2-0.5)/0.5; r=c2[0]+(c3[0]-c2[0])*tt2; g=c2[1]+(c3[1]-c2[1])*tt2; b=c2[2]+(c3[2]-c2[2])*tt2; }
    return 'rgb('+Math.round(r)+','+Math.round(g)+','+Math.round(b)+')';
  }

  function renderHeroForSession(){
    var main, sub;
    if(currentSessionMeta){
      main = lang==='ko' ? (currentSessionMeta.titleKo||currentSessionMeta.titleEn) : (currentSessionMeta.titleEn||currentSessionMeta.titleKo);
      var other = lang==='ko' ? currentSessionMeta.titleEn : currentSessionMeta.titleKo;
      sub = (other && other!==main) ? other : '';
    } else {
      main = t('sessionNotFound'); sub='';
    }
    document.getElementById('heroTitle').textContent = main;
    document.getElementById('heroTitleSub').textContent = sub;
  }

  // ================= INIT =================
  (async function init(){
    renderStaticText();

    if(!sessionId){
      document.getElementById('hubView').style.display = '';
      document.getElementById('sessionView').style.display = 'none';
      document.getElementById('heroTitle').textContent = t('heroTagHub');
      document.getElementById('heroTitleSub').textContent = '';

      if(!isAdmin){
        document.getElementById('hubLocked').innerHTML = '<div class="big">🔒</div>'+t('hubLockedMsg');
        document.getElementById('hubLocked').style.display = '';
        document.getElementById('hubAdminContent').style.display = 'none';
        return;
      }
      document.getElementById('hubLocked').style.display = 'none';
      document.getElementById('hubAdminContent').style.display = '';
      try{
        sessionsIndex = await fetchSessionsIndex();
      }catch(e){
        showToast(t('toastLoadFail'));
        sessionsIndex = [];
      }
      renderSessionList();
      return;
    }

    document.getElementById('hubView').style.display = 'none';
    document.getElementById('sessionView').style.display = '';

    try{
      var doc = await sessionDoc(sessionId).get();
      currentSessionMeta = doc.exists ? Object.assign({id:doc.id}, doc.data()) : null;
    }catch(e){
      currentSessionMeta = null;
    }
    renderHeroForSession();

    if(!currentSessionMeta){
      document.getElementById('sessionNotFound').style.display = '';
      document.getElementById('sessionTabs').style.display = 'none';
      return;
    }

    document.getElementById('sessionLinkInput').value = fullLink(sessionId);
    document.getElementById('adminLinkInput').value = fullLinkAdmin(sessionId);
    document.getElementById('renameKoInput').value = currentSessionMeta.titleKo || '';
    document.getElementById('renameEnInput').value = currentSessionMeta.titleEn || '';

    if(!isAdmin){
      document.getElementById('tabAdminBtn').style.display = 'none';
    }

    try{
      activeDates = await fetchActiveDates(sessionId);
      activeDates.sort();
      adminSelection = new Set(activeDates);
    }catch(e){
      activeDates = []; adminSelection = new Set();
      showToast(t('toastLoadFail'));
    }
    renderAdminCalendar();
    renderScheduleGrid();
  })();

})();
</script>
